<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time object detection powered by YOLO11n — runs entirely in your browser.">
  <title>Object Detection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='12' cy='12' r='3'/></svg>">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <p class="loader-text" id="loader-text">Loading model...</p>
  </div>

  <!-- Floating Back Button for Detection View -->
  <button class="header-back" id="btn-back">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Back
  </button>

  <!-- Landing: Choose Mode -->
  <main class="landing" id="landing">
    <div class="landing-inner">
      <img src="./Logo.png" alt="Synthrium Logo" class="landing-logo">
      <h1 class="landing-title">Synthrium</h1>
      <p class="landing-subtitle">Object Detection</p>
      
      <div class="landing-options">
        <!-- Open Camera -->
        <button class="btn btn-primary" id="opt-camera">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Open Camera</span>
        </button>
        <!-- Upload Image -->
        <button class="btn btn-secondary" id="opt-upload">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Upload Photo</span>
        </button>
      </div>
      
      <a href="#" class="view-supported">View Supported Items</a>
    </div>
  </main>

  <!-- Detection View (Camera or Upload result) -->
  <div class="detection-view" id="detection-view">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" accept="image/*" class="file-input" id="file-input">

  <script type="module" src="./js/app.js"></script>
</body>
</html>
