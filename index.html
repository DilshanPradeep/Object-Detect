<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time object detection powered by YOLO11n — runs entirely in your browser.">
  <title>Object Detection</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='12' cy='12' r='3'/></svg>">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <p class="loader-text" id="loader-text">Loading model...</p>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <img src="./Logo.png" alt="Synthrium Logo" class="brand-logo">
      <h1>Synthrium Object Detection</h1>
    </div>
    <button class="header-back" id="btn-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back
    </button>
  </header>

  <!-- Landing: Choose Mode -->
  <main class="landing" id="landing">
    <div class="landing-inner">
      <h2 class="landing-title">Detect Objects</h2>
      <p class="landing-subtitle">Open your camera for real-time detection or upload an image to identify objects.</p>
      <div class="landing-options">
        <!-- Open Camera -->
        <div class="option-card" id="opt-camera">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Open Camera</span>
        </div>
        <!-- Upload Image -->
        <div class="option-card" id="opt-upload">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Upload Image</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Detection View (Camera or Upload result) -->
  <div class="detection-view" id="detection-view">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" accept="image/*" class="file-input" id="file-input">

  <script type="module" src="./js/app.js"></script>
</body>
</html>
